x-live-base: &live-base
  image: ghcr.io/${GITHUB_REPO:-local}/qm-live:${IMAGE_TAG:-latest}
  restart: unless-stopped
  env_file:
    - ${ENV_FILE:-./secrets/env.txt}
  mem_limit: 512m
  stop_grace_period: 45s
  networks:
    - qm-network
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "5"

services:
  div-live-eth:
    <<: *live-base
    container_name: qm_div_live_eth
    command:
      - "--dutch"
      - "--divergence"
      - "--live"
      - "--asset"
      - "ETH"
      - "--timeframes"
      - "${TIMEFRAMES:-5m}"
      - "--live-order-size"
      - "${ORDER_SIZE:-2.0}"
      - "--live-max-daily-loss"
      - "${MAX_DAILY_LOSS:-50.0}"
      - "--dutch-tick-log"
    volumes:
      - live_data_eth:/app/data/divergence_live
      - ${MODELS_DIR:-./models/pulse_v2}:/app/data/models/pulse_v2:ro
      - ${KNOBS_DIR:-./knobs}:/app/autoresearch/dutch:ro

  div-live-sol:
    <<: *live-base
    container_name: qm_div_live_sol
    command:
      - "--dutch"
      - "--divergence"
      - "--live"
      - "--asset"
      - "SOL"
      - "--timeframes"
      - "${TIMEFRAMES:-5m}"
      - "--live-order-size"
      - "${ORDER_SIZE:-2.0}"
      - "--live-max-daily-loss"
      - "${MAX_DAILY_LOSS:-50.0}"
      - "--dutch-tick-log"
    volumes:
      - live_data_sol:/app/data/divergence_live
      - ${MODELS_DIR:-./models/pulse_v2}:/app/data/models/pulse_v2:ro
      - ${KNOBS_DIR:-./knobs}:/app/autoresearch/dutch:ro

  div-live-xrp:
    <<: *live-base
    container_name: qm_div_live_xrp
    command:
      - "--dutch"
      - "--divergence"
      - "--live"
      - "--asset"
      - "XRP"
      - "--timeframes"
      - "${TIMEFRAMES:-5m}"
      - "--live-order-size"
      - "${ORDER_SIZE:-2.0}"
      - "--live-max-daily-loss"
      - "${MAX_DAILY_LOSS:-50.0}"
      - "--dutch-tick-log"
    volumes:
      - live_data_xrp:/app/data/divergence_live
      - ${MODELS_DIR:-./models/pulse_v2}:/app/data/models/pulse_v2:ro
      - ${KNOBS_DIR:-./knobs}:/app/autoresearch/dutch:ro

volumes:
  live_data_eth:
  live_data_sol:
  live_data_xrp:

networks:
  qm-network:
    driver: bridge
