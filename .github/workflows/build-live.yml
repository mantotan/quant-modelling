name: Build Live Trading Image
on:
  push:
    branches: [main]
    paths:
      - 'src/qm/strategy/**'
      - 'src/qm/execution/**'
      - 'scripts/monitor_pulse.py'
      - '.docker/**'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen
      - run: uv run pytest tests/unit/strategy/ -v --tb=short -x

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: .docker/Dockerfile.live
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/qm-live:latest
            ghcr.io/${{ github.repository }}/qm-live:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
